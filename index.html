<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>미니게임 기획 프롬프트 생성기</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 커스텀 스크롤바 디자인 */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
        /* 라디오 버튼 커스텀 (숨김 처리 후 라벨 스타일링) */
        input[type="radio"] {
            accent-color: #3b82f6;
            width: 1.25rem;
            height: 1.25rem;
        }
    </style>
</head>
<!-- 모바일은 min-h-screen으로 스크롤 허용, PC(md이상)는 h-screen 및 overflow-hidden으로 1화면 고정 -->
<body class="bg-slate-100 min-h-screen md:h-screen md:w-screen md:overflow-hidden text-slate-800 font-sans selection:bg-blue-200 flex flex-col">

    <!-- 메인 컨테이너 -->
    <div class="flex-1 w-full max-w-7xl mx-auto flex flex-col md:flex-row p-4 md:p-6 gap-4 md:min-h-0">

        <!-- 왼쪽 패널: 기획서 폼 (입력) -->
        <!-- 모바일에서는 높이 제한 없이 내용물만큼 늘어남, PC에서는 고정 높이 -->
        <div class="w-full md:flex-1 bg-white rounded-2xl shadow-lg border border-slate-200 flex flex-col md:overflow-hidden md:h-full relative">
            
            <!-- 패널 헤더 -->
            <div class="bg-blue-50/50 p-4 border-b border-slate-100 flex-shrink-0">
                <h1 class="text-xl font-bold flex items-center gap-2">
                    <span>🎮</span> 미니게임 기획 프롬프트 생성기
                </h1>
                <p class="text-sm text-slate-600 mt-1">우리 조의 재난 상황을 가장 잘 보여줄 수 있는 게임 형태를 고르고, 빈칸을 채워주세요.</p>
            </div>

            <!-- 폼 내용 (PC에서만 내부 스크롤 발생) -->
            <div class="p-4 md:p-6 flex-1 space-y-8 md:overflow-y-auto" id="form-container">
                
                <!-- 공통 기획 -->
                <section class="space-y-3 bg-slate-50 p-4 rounded-xl border border-slate-100">
                    <h2 class="font-bold text-slate-700">공통 기획 (배경 설정)</h2>
                    <div class="space-y-4 text-sm">
                        <div class="flex flex-col gap-1">
                            <label class="font-medium text-slate-700">캠페인 제목 <span class="text-red-500">*</span></label>
                            <input type="text" id="campaignTitle" placeholder="예: 북극곰 살리기 대작전" class="w-full border border-slate-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
                        </div>
                        <div class="flex flex-col gap-1">
                            <label class="font-medium text-slate-700">2060년 재난 상황 <span class="text-red-500">*</span></label>
                            <input type="text" id="disasterSituation" placeholder="예: 빙하가 모두 녹아버린 바다" class="w-full border border-slate-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
                        </div>
                    </div>
                </section>

                <!-- 1. 장르 선택 -->
                <section class="space-y-3">
                    <h2 class="font-bold text-slate-700">[1. 장르 선택] (택 1) <span class="text-red-500">*</span></h2>
                    <div class="flex flex-col gap-3 text-sm">
                        <label class="flex items-start gap-3 cursor-pointer p-2 rounded-lg hover:bg-slate-50 transition-colors">
                            <input type="radio" name="genre" value="낙하형 (위에서 떨어지는 것을 피하거나 먹는 형태)" class="mt-0.5">
                            <div>
                                <span class="font-medium">낙하형</span> (예: 똥피하기) <br>
                                <span class="text-slate-500 text-xs">위에서 떨어지는 '이것'을 피하거나 먹어야 해!</span>
                            </div>
                        </label>
                        <label class="flex items-start gap-3 cursor-pointer p-2 rounded-lg hover:bg-slate-50 transition-colors">
                            <input type="radio" name="genre" value="런닝형 (계속 앞으로 달려가며 장애물을 피하는 형태)" class="mt-0.5">
                            <div>
                                <span class="font-medium">런닝형</span> (예: 공룡 달리기) <br>
                                <span class="text-slate-500 text-xs">계속 앞으로 달려가며 장애물인 '이것'을 뛰어넘어야 해!</span>
                            </div>
                        </label>
                        <label class="flex items-start gap-3 cursor-pointer p-2 rounded-lg hover:bg-slate-50 transition-colors">
                            <input type="radio" name="genre" value="생존형 (사방에서 몰려오는 적을 피하는 형태)" class="mt-0.5">
                            <div>
                                <span class="font-medium">생존형</span> (예: 뱀파이어 서바이버즈) <br>
                                <span class="text-slate-500 text-xs">사방에서 몰려오는 '이것'을 피해 살아남아야 해!</span>
                            </div>
                        </label>
                    </div>
                </section>

                <!-- 2. 캐릭터 설정 -->
                <section class="space-y-3">
                    <h2 class="font-bold text-slate-700">[2. 캐릭터 설정]</h2>
                    <div class="space-y-3 text-sm">
                        <div class="flex flex-col md:flex-row md:items-center gap-1 md:gap-3">
                            <label class="w-32 font-medium text-slate-700 shrink-0">• 주인공 (플레이어) <span class="text-red-500">*</span></label>
                            <input type="text" id="character" placeholder="예: 튜브 탄 학생, 바다거북" class="flex-1 border-b border-slate-300 p-1 bg-transparent focus:border-blue-500 outline-none transition-colors">
                        </div>
                        <div class="flex flex-col md:flex-row md:items-center gap-1 md:gap-3">
                            <label class="w-32 font-medium text-slate-700 shrink-0">• 방해물 (피해야 할 것) <span class="text-red-500">*</span></label>
                            <input type="text" id="obstacle" placeholder="예: 쓰레기, 농약 방울" class="flex-1 border-b border-slate-300 p-1 bg-transparent focus:border-blue-500 outline-none transition-colors">
                        </div>
                        <div class="flex flex-col md:flex-row md:items-center gap-1 md:gap-3">
                            <label class="w-32 font-medium text-slate-700 shrink-0">• 아이템 (선택사항)</label>
                            <input type="text" id="item" placeholder="예: 깨끗한 물방울" class="flex-1 border-b border-slate-300 p-1 bg-transparent focus:border-blue-500 outline-none transition-colors">
                        </div>
                    </div>
                </section>

                <!-- 3. 엔딩 조건 -->
                <section class="space-y-3">
                    <h2 class="font-bold text-slate-700">[3. 엔딩 조건]</h2>
                    <div class="space-y-3 text-sm">
                        <div class="flex flex-col md:flex-row md:items-center gap-1 md:gap-3">
                            <label class="w-24 font-medium text-slate-700 shrink-0">• 승리 조건 <span class="text-red-500">*</span></label>
                            <input type="text" id="winCondition" placeholder="예: 30초 버티기, 쓰레기 10개 줍기" class="flex-1 border-b border-slate-300 p-1 bg-transparent focus:border-blue-500 outline-none transition-colors">
                        </div>
                        <div class="flex flex-col md:flex-row md:items-center gap-1 md:gap-3">
                            <label class="w-24 font-medium text-slate-700 shrink-0">• 실패 조건 <span class="text-red-500">*</span></label>
                            <input type="text" id="loseCondition" placeholder="예: 방해물에 3번 부딪히기" class="flex-1 border-b border-slate-300 p-1 bg-transparent focus:border-blue-500 outline-none transition-colors">
                        </div>
                    </div>
                </section>

                <!-- 4. 조작 방법 -->
                <section class="space-y-3 pb-4">
                    <h2 class="font-bold text-slate-700">[4. 조작 방법] (택 1) <span class="text-red-500">*</span></h2>
                    <div class="flex flex-col sm:flex-row gap-4 text-sm">
                        <label class="flex items-center gap-2 cursor-pointer p-2 rounded-lg hover:bg-slate-50 transition-colors flex-1 border border-slate-200">
                            <input type="radio" name="control" value="스마트폰 화면 터치 및 드래그">
                            <span class="font-medium">스마트폰 터치 (또는 마우스 클릭)</span>
                        </label>
                        <label class="flex items-center gap-2 cursor-pointer p-2 rounded-lg hover:bg-slate-50 transition-colors flex-1 border border-slate-200">
                            <input type="radio" name="control" value="키보드 방향키(←, →, ↑, ↓) 및 화면 터치">
                            <span class="font-medium">키보드 방향키 (←, →, ↑, ↓)</span>
                        </label>
                    </div>
                </section>

            </div>
            
            <!-- 생성 버튼 영역 (고정) -->
            <div class="bg-white p-4 border-t border-slate-200 flex-shrink-0">
                <button id="generateBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition-colors shadow-md flex justify-center items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>
                    프롬프트 만들기
                </button>
            </div>
        </div>

        <!-- 오른쪽 패널: 결과물 출력 (프롬프트) -->
        <!-- 모바일에서는 최소 높이를 주어 영역을 확보함 -->
        <div class="w-full md:flex-1 bg-slate-900 rounded-2xl shadow-xl flex flex-col md:overflow-hidden min-h-[500px] md:min-h-0 md:h-full relative text-slate-300 mb-4 md:mb-0">
            
            <!-- 패널 헤더 -->
            <div class="bg-slate-800 p-4 border-b border-slate-700 flex-shrink-0 flex justify-between items-center">
                <h2 class="text-lg font-bold text-white flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-blue-400"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" x2="15" y1="20" y2="20"/><line x1="12" x2="12" y1="4" y2="20"/></svg>
                    게임 개발자 프롬프트
                </h2>
                <!-- 복사 버튼 (헤더 우측) -->
                <button id="copyBtn" class="hidden text-sm bg-slate-700 hover:bg-slate-600 text-white py-1.5 px-3 rounded-lg transition-colors items-center gap-1 border border-slate-600">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>
                    프롬프트 복사
                </button>
            </div>

            <!-- 결과물 내용 (PC에서만 내부 스크롤 발생) -->
            <div class="p-4 md:p-6 flex-1 relative md:overflow-y-auto">
                
                <!-- 빈 상태 (초기 화면) -->
                <div id="emptyState" class="absolute inset-0 flex flex-col items-center justify-center text-slate-500 h-full w-full">
                    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="mb-4 opacity-50"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M7 7h10"/><path d="M7 12h10"/><path d="M7 17h10"/></svg>
                    <p>양식을 모두 채우고 버튼을 누르면</p>
                    <p class="text-sm mt-1">여기에 AI용 프롬프트가 완성됩니다.</p>
                </div>

                <!-- 출력 영역 -->
                <div id="promptOutput" class="hidden text-sm leading-relaxed whitespace-pre-wrap font-mono text-slate-200"></div>
                
            </div>
        </div>

    </div>

    <!-- 커스텀 알림 모달 -->
    <div id="alertModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50 p-4 transition-opacity opacity-0">
        <div class="bg-white rounded-xl shadow-2xl max-w-sm w-full p-6 transform scale-95 transition-transform duration-200" id="alertBox">
            <div class="flex items-center justify-center w-12 h-12 rounded-full bg-red-100 mb-4 mx-auto">
                <svg class="w-6 h-6 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
            </div>
            <h3 class="text-lg font-bold text-center text-slate-800 mb-2">입력 확인</h3>
            <p id="alertMessage" class="text-center text-slate-600 mb-6">모든 필수 항목을 입력해주세요.</p>
            <button id="alertCloseBtn" class="w-full bg-slate-800 hover:bg-slate-900 text-white font-medium py-2.5 rounded-lg transition-colors">확인</button>
        </div>
    </div>

    <!-- 클립보드 복사용 숨겨진 텍스트 영역 -->
    <textarea id="hiddenClipboard" class="absolute left-[-9999px]"></textarea>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const generateBtn = document.getElementById('generateBtn');
            const copyBtn = document.getElementById('copyBtn');
            const promptOutput = document.getElementById('promptOutput');
            const emptyState = document.getElementById('emptyState');
            
            const alertModal = document.getElementById('alertModal');
            const alertBox = document.getElementById('alertBox');
            const alertMessage = document.getElementById('alertMessage');
            const alertCloseBtn = document.getElementById('alertCloseBtn');

            // 커스텀 알림 함수
            const showAlert = (message) => {
                alertMessage.textContent = message;
                alertModal.classList.remove('hidden');
                alertModal.classList.add('flex');
                
                // 애니메이션
                setTimeout(() => {
                    alertModal.classList.remove('opacity-0');
                    alertBox.classList.remove('scale-95');
                    alertBox.classList.add('scale-100');
                }, 10);
            };

            const closeAlert = () => {
                alertModal.classList.add('opacity-0');
                alertBox.classList.remove('scale-100');
                alertBox.classList.add('scale-95');
                
                setTimeout(() => {
                    alertModal.classList.add('hidden');
                    alertModal.classList.remove('flex');
                }, 200);
            };

            alertCloseBtn.addEventListener('click', closeAlert);
            alertModal.addEventListener('click', (e) => {
                if(e.target === alertModal) closeAlert();
            });

            // 프롬프트 생성 로직
            generateBtn.addEventListener('click', () => {
                // 1. 값 가져오기
                const campaignTitle = document.getElementById('campaignTitle').value.trim();
                const disasterSituation = document.getElementById('disasterSituation').value.trim();
                const genreEl = document.querySelector('input[name="genre"]:checked');
                const character = document.getElementById('character').value.trim();
                const obstacle = document.getElementById('obstacle').value.trim();
                let item = document.getElementById('item').value.trim();
                const winCondition = document.getElementById('winCondition').value.trim();
                const loseCondition = document.getElementById('loseCondition').value.trim();
                const controlEl = document.querySelector('input[name="control"]:checked');

                // 2. 유효성 검사 (아이템은 선택사항)
                if (!campaignTitle) return showAlert('공통 기획: 캠페인 제목을 입력해주세요.');
                if (!disasterSituation) return showAlert('공통 기획: 2060년 재난 상황을 입력해주세요.');
                if (!genreEl) return showAlert('장르를 선택해주세요.');
                if (!character) return showAlert('주인공(플레이어)을 입력해주세요.');
                if (!obstacle) return showAlert('방해물(피해야 할 것)을 입력해주세요.');
                if (!winCondition) return showAlert('승리 조건을 입력해주세요.');
                if (!loseCondition) return showAlert('실패 조건을 입력해주세요.');
                if (!controlEl) return showAlert('조작 방법을 선택해주세요.');

                // 아이템 없음 처리
                if (item === '') item = '없음';

                const genre = genreEl.value;
                const control = controlEl.value;

                // 3. 템플릿 텍스트 생성 (지정된 형식에 맞춤)
                const resultText = `너는 천재 게임 개발자야. 모바일 웹 브라우저에서 바로 실행할 수 있는 미니게임 코드를 HTML, CSS, JavaScript 하나로 합쳐서 짜줘. 스마트폰 화면 크기에 딱 맞게(반응형으로) 만들어줘.

1. 게임 배경: 이 게임의 제목은 **"${campaignTitle}"**이야. 배경 디자인은 **"${disasterSituation}"**이라는 끔찍한 상황에 어울리게 꾸며줘.

2. 장르: [ ${genre} ] 게임이야.

3. 캐릭터 설정: 플레이어 주인공은 [ ${character} ](이)고, 피해야 할 방해물은 [ ${obstacle} ](이)야. 가끔씩 맵에 [ ${item} ] 아이템이 나타나는데, 이걸 먹으면 도움이 되게 해줘. (캐릭터와 아이템은 복잡한 이미지 대신 귀여운 '이모지'로 표현해 줘!)

4. 게임 규칙 (엔딩 조건): 실패 조건은 [ ${loseCondition} ] 창이 뜨며 게임 오버되는 것이고, 승리 조건은 [ ${winCondition} ] 창이 뜨며 클리어되는 거야. 상단에 진행 상황(시간, 점수, 목숨 등)을 표시해 정해줘. 방해물은 갈수록 많아지거나 빨라져야 해.

5. 조작 방법 (매우 중요): 스마트폰에서 할 거니까, 조작 방법은 무조건 [ ${control} ](으)로 움직일 수 있게 만들어줘.`;

                // 4. 화면에 출력
                promptOutput.textContent = resultText;
                
                // 5. UI 업데이트
                emptyState.classList.add('hidden');
                promptOutput.classList.remove('hidden');
                copyBtn.classList.remove('hidden');
                copyBtn.classList.add('flex');

                // 모바일 환경일 경우, 프롬프트 결과창으로 부드럽게 자동 스크롤
                if (window.innerWidth < 768) {
                    const rightPanel = document.querySelector('.bg-slate-900');
                    rightPanel.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }
            });

            // 복사 기능 (iframe 환경을 고려하여 execCommand 사용)
            copyBtn.addEventListener('click', () => {
                const textToCopy = promptOutput.textContent;
                const hiddenTextarea = document.getElementById('hiddenClipboard');
                
                hiddenTextarea.value = textToCopy;
                hiddenTextarea.select();
                hiddenTextarea.setSelectionRange(0, 99999); // 모바일 대응

                try {
                    document.execCommand('copy');
                    
                    // 복사 성공 시 버튼 시각적 피드백
                    const originalHTML = copyBtn.innerHTML;
                    copyBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-green-400"><polyline points="20 6 9 17 4 12"/></svg> 복사 완료!`;
                    copyBtn.classList.replace('bg-slate-700', 'bg-green-700/50');
                    copyBtn.classList.replace('hover:bg-slate-600', 'hover:bg-green-700/70');
                    copyBtn.classList.replace('border-slate-600', 'border-green-600');
                    
                    setTimeout(() => {
                        copyBtn.innerHTML = originalHTML;
                        copyBtn.classList.replace('bg-green-700/50', 'bg-slate-700');
                        copyBtn.classList.replace('hover:bg-green-700/70', 'hover:bg-slate-600');
                        copyBtn.classList.replace('border-green-600', 'border-slate-600');
                    }, 2000);
                } catch (err) {
                    showAlert('복사에 실패했습니다. 직접 드래그하여 복사해주세요.');
                }
                
                // 포커스 해제
                window.getSelection().removeAllRanges();
            });
        });
    </script>
</body>
</html>
