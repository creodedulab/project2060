<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>프로젝트 2060 : K-SDGs 지구방위대</title>
    <!-- Tailwind CSS (디자인용) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide 아이콘 (아이콘용) -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="h-screen w-full bg-gray-50 flex flex-col font-sans overflow-hidden">

    <!-- 상단 고정 헤더 -->
    <header class="flex-none bg-white shadow-sm p-4 z-10 flex items-center justify-center">
        <button id="homeBtn" class="p-2 text-gray-500 hover:text-indigo-600 transition-colors rounded-xl hover:bg-gray-100 flex items-center justify-center" title="홈으로 이동">
            <!-- 홈 아이콘 -->
            <i data-lucide="home" class="w-7 h-7 stroke-[2.5]"></i>
        </button>
    </header>

    <!-- 중앙 컨텐츠 영역 -->
    <main class="flex-1 w-full max-w-5xl mx-auto p-4 flex flex-col items-center justify-center overflow-auto relative">
        
        <!-- 초기 버튼 선택 화면 -->
        <div id="menuView" class="max-w-md w-full bg-white rounded-3xl shadow-xl p-8 text-center flex flex-col transition-opacity duration-300">
            <!-- 타이틀 영역 -->
            <div class="mb-8 flex flex-col items-center justify-center space-y-3">
                <h1 class="text-2xl font-extrabold text-indigo-600 break-keep leading-snug">
                    프로젝트 2060 <br /> : K-SDGs 지구방위대
                </h1>
                <h2 class="text-lg font-bold text-gray-800 mt-2">
                    당신의 역할은 무엇입니까?
                </h2>
            </div>

            <!-- 버튼 그리드 영역 -->
            <div id="buttonGrid" class="grid grid-cols-2 gap-4">
                <!-- Javascript로 버튼이 여기에 생성됩니다 -->
            </div>
        </div>

        <!-- HTML 실행 화면 (iframe, 초기엔 숨겨짐) -->
        <div id="iframeView" class="hidden w-full h-full flex flex-col bg-white rounded-2xl shadow-lg overflow-hidden border border-gray-200">
            <iframe id="contentFrame" src="" class="w-full flex-1 border-none bg-white" title="External Content"></iframe>
        </div>

    </main>

    <!-- 하단 고정 푸터 -->
    <footer class="flex-none bg-white py-4 mt-auto text-center text-sm text-gray-500 font-medium tracking-wide shadow-[0_-1px_3px_rgba(0,0,0,0.05)] z-10">
        &copy; 2026 크레오디교육연구소. All rights reserved.
    </footer>

    <!-- 동작을 위한 Javascript -->
    <script>
        // 버튼 데이터 설정
        const buttonsData = [
            { id: 1, label: '웹 개발자', icon: 'monitor', color: 'bg-blue-500 hover:bg-blue-600', link: 'prompt01.html' },
            { id: 2, label: '게임 개발자', icon: 'gamepad-2', color: 'bg-green-500 hover:bg-green-600', link: 'prompt02.html' },
            { id: 3, label: '비주얼 디자이너', icon: 'paintbrush', color: 'bg-red-500 hover:bg-red-600', link: 'prompt03.html' },
            { id: 4, label: '사운드 디렉터', icon: 'music', color: 'bg-purple-500 hover:bg-purple-600', link: 'prompt04.html' },
        ];

        // 요소 가져오기
        const menuView = document.getElementById('menuView');
        const iframeView = document.getElementById('iframeView');
        const contentFrame = document.getElementById('contentFrame');
        const homeBtn = document.getElementById('homeBtn');
        const buttonGrid = document.getElementById('buttonGrid');

        // 버튼 렌더링
        buttonsData.forEach(btn => {
            const buttonEl = document.createElement('button');
            buttonEl.className = `${btn.color} text-white font-medium py-6 px-4 rounded-2xl shadow-sm transform transition-all duration-200 hover:scale-105 active:scale-95 flex flex-col items-center justify-center gap-3 w-full`;
            buttonEl.onclick = () => openPage(btn.link);
            
            buttonEl.innerHTML = `
                <i data-lucide="${btn.icon}" class="w-7 h-7 stroke-[2.5]"></i>
                <span class="text-lg">${btn.label}</span>
            `;
            buttonGrid.appendChild(buttonEl);
        });

        // 아이콘 초기화 (Lucide 아이콘 화면에 표시)
        lucide.createIcons();

        // 페이지 열기 함수 (버튼 클릭 시)
        function openPage(link) {
            contentFrame.src = link;
            menuView.classList.add('hidden');          // 메뉴 숨기기
            iframeView.classList.remove('hidden');       // iframe 보이기
            iframeView.classList.add('flex');            // 레이아웃 유지
        }

        // 홈으로 돌아가기 함수 (홈 버튼 클릭 시)
        homeBtn.onclick = () => {
            contentFrame.src = '';                       // iframe 내용 비우기
            iframeView.classList.add('hidden');          // iframe 숨기기
            iframeView.classList.remove('flex');
            menuView.classList.remove('hidden');         // 메뉴 다시 보이기
        };
    </script>
</body>
</html>
