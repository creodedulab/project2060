<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>캠페인 BGM 프롬프트 생성기</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        input[type="radio"], input[type="checkbox"] { accent-color: #4f46e5; width: 1.1rem; height: 1.1rem; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen md:h-screen md:w-screen md:overflow-hidden text-slate-800 font-sans selection:bg-indigo-200 flex flex-col">

    <div class="flex-1 w-full max-w-7xl mx-auto flex flex-col md:flex-row p-4 md:p-6 gap-4 md:min-h-0">

        <div class="w-full md:flex-1 bg-white rounded-2xl shadow-lg border border-slate-200 flex flex-col md:overflow-hidden md:h-full relative text-sm">
            
            <div class="bg-indigo-50/50 p-4 border-b border-slate-100 flex-shrink-0">
                <h1 class="text-xl font-bold flex items-center gap-2">
                    <span>🎵</span> 캠페인 BGM 분위기 <span class="text-xs font-normal text-slate-500">(사운드 디렉터)</span>
                </h1>
                <p class="text-xs text-slate-500 mt-1"></p>
            </div>

            <div class="p-4 md:p-6 flex-1 space-y-8 md:overflow-y-auto" id="inputForm">
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <section class="space-y-3">
                        <h2 class="font-bold text-slate-900 text-base">① 트랙 형태 (고정)</h2>
                        <label class="flex items-center gap-3 p-3 rounded-xl bg-slate-50 border border-slate-200 cursor-default">
                            <input type="checkbox" checked disabled>
                            <span>연주곡 (Inst) <span class="text-xs text-slate-400">- 배경음악 전용</span></span>
                        </label>
                    </section>

                    <section class="space-y-3">
                        <h2 class="font-bold text-slate-900 text-base">② 속도/템포 (택 1)</h2>
                        <div class="space-y-2">
                            <label class="flex items-start gap-2 cursor-pointer">
                                <input type="radio" name="tempo" value="Fast, urgent, 140BPM" class="mt-1">
                                <div>빠르고 긴박하게 <p class="text-[11px] text-slate-400">(달리기/도망 상황)</p></div>
                            </label>
                            <label class="flex items-start gap-2 cursor-pointer">
                                <input type="radio" name="tempo" value="Moderate tempo, 90BPM" class="mt-1">
                                <div>중간 속도 <p class="text-[11px] text-slate-400">(걷기 속도)</p></div>
                            </label>
                            <label class="flex items-start gap-2 cursor-pointer">
                                <input type="radio" name="tempo" value="Slow, heavy, 60BPM" class="mt-1">
                                <div>느리고 무겁게 <p class="text-[11px] text-slate-400">(절망적인 상황)</p></div>
                            </label>
                        </div>
                    </section>
                </div>

                <section class="space-y-3">
                    <h2 class="font-bold text-slate-900 text-base">③ 분위기 및 감정 (택 1)</h2>
                    <div class="grid grid-cols-2 gap-4">
                        <label class="flex items-start gap-2 cursor-pointer text-[13px]"><input type="radio" name="mood" value="Tense, eerie, dark" class="mt-1"><span>긴장감 / 으스스한</span></label>
                        <label class="flex items-start gap-2 cursor-pointer text-[13px]"><input type="radio" name="mood" value="Sad, emotional, melancholic" class="mt-1"><span>슬프고 아련한</span></label>
                        <label class="flex items-start gap-2 cursor-pointer text-[13px]"><input type="radio" name="mood" value="Hopeful, bright, uplifting" class="mt-1"><span>희망차고 밝은</span></label>
                        <label class="flex items-start gap-2 cursor-pointer text-[13px]"><input type="radio" name="mood" value="Playful, quirky, bouncy" class="mt-1"><span>코믹하고 튀는</span></label>
                        <label class="flex items-start gap-2 cursor-pointer text-[13px]"><input type="radio" name="mood" value="Grand, solemn, epic" class="mt-1"><span>웅장하고 비장한</span></label>
                        <label class="flex items-start gap-2 cursor-pointer text-[13px]"><input type="radio" name="mood" value="Dreamy, mysterious, ambient" class="mt-1"><span>몽환 / 신비로운</span></label>
                    </div>
                </section>

                <section class="space-y-2">
                    <h2 class="font-bold text-slate-900 text-base">④ 메인 악기 (Lead Instrument)</h2>
                    <input type="text" id="instrument" placeholder="(예: Synthesizer, Piano, Violin 등)" class="w-full border-b-2 border-slate-200 p-1 focus:border-indigo-500 outline-none italic text-sm">
                </section>

                <section class="space-y-3 pb-8">
                    <h2 class="font-bold text-slate-900 text-base">⑤ 핵심 장르 (택 1)</h2>
                    <div class="grid grid-cols-2 gap-4 text-[13px]">
                        <label class="flex items-start gap-2 cursor-pointer"><input type="radio" name="genre" value="Cinematic" class="mt-1"><span>시네마틱</span></label>
                        <label class="flex items-start gap-2 cursor-pointer"><input type="radio" name="genre" value="8-bit Chiptune" class="mt-1"><span>8비트 레트로</span></label>
                        <label class="flex items-start gap-2 cursor-pointer"><input type="radio" name="genre" value="Ambient" class="mt-1"><span>앰비언트</span></label>
                        <label class="flex items-start gap-2 cursor-pointer"><input type="radio" name="genre" value="Electronic, EDM" class="mt-1"><span>일렉트로닉</span></label>
                        <label class="flex items-start gap-2 cursor-pointer"><input type="radio" name="genre" value="Lo-Fi" class="mt-1"><span>로파이</span></label>
                        <label class="flex items-start gap-2 cursor-pointer"><input type="radio" name="genre" value="Rock, Metal" class="mt-1"><span>록 / 메탈</span></label>
                    </div>
                </section>

            </div>
            
            <div class="bg-white p-4 border-t border-slate-200 flex-shrink-0">
                <button id="generateBtn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-xl shadow-lg transition-all active:scale-95">
                    프롬프트 생성
                </button>
            </div>
        </div>

        <div class="w-full md:flex-1 bg-slate-900 rounded-2xl shadow-xl flex flex-col md:overflow-hidden min-h-[300px] md:h-full relative text-slate-300">
            <div class="bg-slate-800 p-4 border-b border-slate-700 flex justify-between items-center flex-shrink-0">
                <h2 class="text-lg font-bold text-white flex items-center gap-2">📜 생성된 프롬프트</h2>
                <button id="copyBtn" class="hidden bg-indigo-600 hover:bg-indigo-500 text-white py-2 px-4 rounded-lg font-bold transition-all border border-indigo-500">
                    프롬프트 복사
                </button>
            </div>
            <div class="p-6 flex-1 relative md:overflow-y-auto">
                <div id="emptyState" class="absolute inset-0 flex flex-col items-center justify-center text-slate-500 text-center p-6">
                    <p>학습지를 채우고 버튼을 누르세요.</p>
                </div>
                <div id="promptOutput" class="hidden text-lg leading-relaxed whitespace-pre-wrap font-mono text-indigo-200 break-all"></div>
                <div id="charCounter" class="hidden mt-4 text-xs text-slate-500 border-t border-slate-800 pt-2 font-mono"></div>
            </div>
        </div>
    </div>

    <textarea id="tempCopyArea" style="position: absolute; left: -9999px; opacity: 0;" aria-hidden="true"></textarea>
    <footer class="text-center pb-3 pt-2 text-slate-500 text-xs">&copy; 2026 크레오디교육연구소. All rights reserved.</footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const generateBtn = document.getElementById('generateBtn');
            const copyBtn = document.getElementById('copyBtn');
            const promptOutput = document.getElementById('promptOutput');
            const emptyState = document.getElementById('emptyState');
            const tempCopyArea = document.getElementById('tempCopyArea');
            const charCounter = document.getElementById('charCounter');

            generateBtn.addEventListener('click', () => {
                const tempo = document.querySelector('input[name="tempo"]:checked');
                const mood = document.querySelector('input[name="mood"]:checked');
                const instrument = document.getElementById('instrument').value.trim();
                const genre = document.querySelector('input[name="genre"]:checked');

                if (!tempo || !mood || !instrument || !genre) {
                    alert('항목을 선택해주세요!'); return;
                }

                // AI가 가장 효과적으로 인식하는 키워드 나열 방식으로 최적화 (180자 이내)
                const resultText = `Instrumental, ${genre.value}, ${tempo.value}, ${mood.value}, Lead instrument: ${instrument}, high quality audio.`;

                promptOutput.textContent = resultText;
                charCounter.textContent = `글자 수: \${resultText.length}자 / 180자`;
                
                emptyState.classList.add('hidden');
                promptOutput.classList.remove('hidden');
                charCounter.classList.remove('hidden');
                copyBtn.classList.remove('hidden');
                if (window.innerWidth < 768) promptOutput.scrollIntoView({ behavior: 'smooth' });
            });

            copyBtn.addEventListener('click', () => {
                tempCopyArea.value = promptOutput.textContent;
                tempCopyArea.select();
                tempCopyArea.setSelectionRange(0, 99999);
                try {
                    document.execCommand('copy');
                    const originalText = copyBtn.textContent;
                    copyBtn.textContent = '복사 완료!';
                    copyBtn.classList.replace('bg-indigo-600', 'bg-green-600');
                    setTimeout(() => {
                        copyBtn.textContent = originalText;
                        copyBtn.classList.replace('bg-green-600', 'bg-indigo-600');
                    }, 2000);
                } catch (err) {
                    alert('복사 실패');
                }
            });
        });
    </script>
</body>
</html>
